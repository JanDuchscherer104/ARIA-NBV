run_mode = "train"

[datamodule_config]
# Offline cache usage
num_workers                       = 16
persistent_workers                = true
shuffle                           = true
use_train_as_val                  = false
train_cache_new_samples_per_epoch = 0
val_cache_new_samples_per_epoch   = 0

    [datamodule_config.train_cache]
    load_backbone       = true
    map_location        = "cpu"
    split               = "train"
    include_efm_snippet = false
    include_gt_mesh     = false

    [datamodule_config.val_cache]
    load_backbone       = true
    map_location        = "cpu"
    split               = "val"
    include_efm_snippet = false
    include_gt_mesh     = false

[trainer_config]
# Make sure validation runs
enable_validation       = true
check_val_every_n_epoch = 1
num_sanity_val_steps    = 2
fast_dev_run            = false
max_epochs              = 50
accelerator             = "auto"
devices                 = "auto"
log_every_n_steps       = 1
gradient_clip_val       = 3.0
use_wandb               = true

    [trainer_config.callbacks]
    use_early_stopping      = true
    use_model_checkpoint    = true
    checkpoint_monitor      = "val/loss"
    checkpoint_mode         = "min"
    checkpoint_save_top_k   = 1
    early_stopping_monitor  = "val/loss"
    early_stopping_mode     = "min"
    early_stopping_patience = 5
    use_lr_monitor          = true
    lr_logging_interval     = "step"
    use_rich_progress_bar   = true
    use_tqdm_progress_bar   = false
    tqdm_refresh_rate       = 1
    use_rich_model_summary  = true
    rich_summary_max_depth  = 4

[module_config]
num_classes             = 15
save_binner             = true
binner_path             = ".logs/vin/rri_binner.json"
use_valid_frac_weight   = true
valid_frac_weight_floor = 0.1
aux_regression_loss     = "huber"
log_grad_norms          = true

    [module_config.optimizer]
    learning_rate = 3e-4
    weight_decay  = 1e-3

    [module_config.vin]
    # VIN v2 core knobs
    num_classes                    = 15
    head_hidden_dim                = 192
    head_num_layers                = 2
    head_dropout                   = 0.05
    head_activation                = "gelu"
    coral_preinit_bias             = true
    field_dim                      = 16
    field_gn_groups                = 4
    occ_pr_is_logits               = false
    apply_cw90_correction          = true
    tf_pos_grid_in_candidate_frame = false
    global_pool_grid_size          = 6
    scene_field_channels           = ["occ_pr", "occ_input", "counts_norm", "cent_pr"]

        [module_config.vin.backbone]
        model_cfg     = ".configs/evl_inf_desktop.yaml"
        model_ckpt    = ".logs/ckpts/model_lite.pth"
        device        = "cuda"
        freeze        = true
        features_mode = "heads"

        [module_config.vin.pose_encoder]
        kind                 = "r6d_lff"
        pose_scale_init      = [1.0, 1.0]
        pose_scale_learnable = true
        pose_scale_eps       = 1e-6

            [module_config.vin.pose_encoder.pose_encoder_lff]
            input_dim     = 9     # 3 for position, 6 for rotation matrix
            fourier_dim   = 64
            hidden_dim    = 128
            output_dim    = 32
            gamma         = 1.0
            include_input = false

        [module_config.vin.pos_grid_encoder_lff]
        input_dim     = 3     # 3 for position
        fourier_dim   = 24
        hidden_dim    = 16
        output_dim    = 12
        gamma         = 1.0
        include_input = false
