# Realistic V1 rollout sample generation with the existing nbv-build-rollouts CLI.
#
# Usage:
#   cd aria_nbv
#   uv run nbv-build-rollouts --config-path ../.configs/build_rollouts_v1_realistic.toml --dry-run
#   uv run nbv-build-rollouts --config-path ../.configs/build_rollouts_v1_realistic.toml
#
# This config intentionally does not rebuild EFM/backbone outputs. It consumes
# the existing immutable VIN offline store in sample mode and writes a separate
# rollouts.zarr replay/training artifact.

max_samples            = 4
max_targets_per_sample = 1
require_label_valid    = true
log_timing             = true
verbosity              = 1

[source]
split                    = "train"
limit                    = 4
return_format            = "sample"
include_efm_snippet      = true
include_gt_mesh          = true
load_backbone            = true
load_candidates          = false
load_depths              = false
load_candidate_pcs       = false
load_gt_obbs             = true
load_detected_obbs       = true
load_trajectory_metadata = true
map_location             = "cuda"
verbosity                = 1

    [source.store]
    store_dir = "vin_offline"

[target_selector]
k                                 = 3
source_mode                       = "v1_actor_visible"
policy                            = "greedy_top_k"
match_gt                          = true
min_confidence                    = 0.2
min_projected_area_pixels         = 16.0
require_projected_visibility      = false
projected_area_normalizer_pixels  = 57600.0
projected_area_full_score_fraction = 0.05
min_support_points                = 3
support_saturation_points         = 128
evl_support_weight                = 1.0
missing_projection_visibility_score = 0.35
obb_support_scale                 = 1.0
max_support_points                = 20000
min_gt_iou                        = 0.1
min_gt_match_score                = 0.05
gt_iou_samples                    = 8
gt_ambiguity_margin               = 0.02

[candidate_mixture.base]
camera_label           = "rgb"
num_samples            = 60
oversample_factor      = 3.0
max_resamples          = 2
align_to_gravity       = true
min_radius             = 0.25
max_radius             = 1.1
min_elev_deg           = -12.0
max_elev_deg           = 18.0
delta_azimuth_deg      = 100.0
sampling_strategy      = "forward_powerspherical"
kappa                  = 8.0
min_distance_to_mesh   = 0.2
ensure_collision_free  = true
ensure_free_space      = true
collision_backend      = "pytorch3d"
ray_subsample          = 32
step_clearance         = 0.1
enforce_motion_realism = true
max_step_distance_m    = 1.1
max_height_delta_m     = 0.4
max_backward_step_m    = 0.4
max_yaw_delta_deg      = 70.0
device                 = "cuda"
verbosity              = 1
collect_rule_masks     = true
collect_debug_stats    = true
view_max_angle_deg     = 0.0
view_max_azimuth_deg   = 0.0
view_max_elevation_deg = 0.0
view_roll_jitter_deg   = 0.0
seed                   = 0

[[candidate_mixture.components]]
name                   = "target_bearing_local"
count                  = 12
view_mode              = "target_point"
position_mode          = "target_bearing_local"
min_radius             = 0.4
max_radius             = 1.1
view_max_azimuth_deg   = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name                   = "forward_local"
count                  = 30
view_mode              = "forward_rig"
position_mode          = "forward_local"
view_max_azimuth_deg   = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name                   = "lateral_target_bypass"
count                  = 10
view_mode              = "target_point"
position_mode          = "lateral_target_bypass"
view_max_azimuth_deg   = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name                   = "local_refinement"
count                  = 4
view_mode              = "forward_rig"
position_mode          = "local_refinement"
min_radius             = 0.45
max_radius             = 1.1
view_max_azimuth_deg   = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name                   = "revisit_backtrack"
count                  = 4
view_mode              = "forward_rig"
position_mode          = "revisit_backtrack"
min_radius             = 0.25
max_radius             = 0.55
view_max_azimuth_deg   = 0.0
view_max_elevation_deg = 0.0

[target_scorer]
backprojection_stride       = 2
target_crop_margin_m        = 0.05
min_current_target_points   = 1
include_scene_rri           = false
eval_point_cloud_source     = "ase_gt_depth_root"
eval_camera_label           = "rgb"
eval_fusion_voxel_size_m    = 0.02
eval_fusion_max_points      = 200000
target_eval_max_points      = 50000
reward_mode                 = "root_normalized_gain"
verbosity                   = 1
log_timing                  = true

    [target_scorer.depth]
    device               = "cuda"
    max_candidates_final = 60
    resolution_scale     = 0.2
    verbosity            = 1

[selected_depth]
enabled     = true
width_px    = 240
height_px   = 240
chunk_steps = 16

[store]
store_dir                    = "rollouts_v1_realistic.zarr"
target_protocol_version      = "v1_observed"
field_retention_policy       = "compact_selected_heavy"
source_offline_store_version = "vin-offline-v7"
split_manifest_hash          = "configured-at-runtime"
discount_gamma               = 1.0
q_h_chunk_states             = 64
target_eval_crop_max_points  = 50000

[[recipes]]
name             = "random_valid"
selection_policy = "random_valid"
horizon          = 1
branch_factor    = 1
seed             = 0

[[recipes]]
name             = "oracle_greedy"
selection_policy = "oracle_greedy"
horizon          = 1
branch_factor    = 1
seed             = 0

[[recipes]]
name             = "oracle_lookahead"
selection_policy = "oracle_greedy"
horizon          = 2
branch_factor    = 2
beam_width       = 2
seed             = 0

[[recipes]]
name                  = "temperature_softmax"
selection_policy      = "temperature_softmax"
horizon               = 2
branch_factor         = 2
beam_width            = 2
selection_temperature = 1.0
seed                  = 0
