        # type: <class 'float'>
        dropout = 0.0
        # type: <class 'int'>
        num_classes = 15
        # type: <class 'str'>
        activation = "gelu"
        # type: <class 'bool'>
        # type: <class 'bool'>
        # type: <class 'bool'>
        # type: <class 'bool'>
