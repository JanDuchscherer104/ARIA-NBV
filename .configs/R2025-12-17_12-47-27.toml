# CLI-enabled experiment config with optional TOML config path.
# type: Literal[train, fit_binner, dump_config]
run_mode = "dump_config"
# type: <class 'str'>
run_name = "R2025-12-17_12-47-27"
# type: <enum 'Stage'>
stage = "train"
# type: <class 'int'>
seed = 0
# type: <class 'pathlib.Path'>
out_dir = ".logs/vin"
# type: <class 'bool'>
fit_binner_only = false
# type: <class 'oracle_rri.configs.path_config.PathConfig'>

[paths]
# type: <class 'pathlib.Path'>
root = "/home/jandu/repos/NBV"
# type: <class 'pathlib.Path'>
data_root = "/home/jandu/repos/NBV/.data"
# type: <class 'pathlib.Path'>
checkpoints = "/home/jandu/repos/NBV/.logs/checkpoints"
# type: <class 'pathlib.Path'>
wandb = "/home/jandu/repos/NBV/.logs/wandb"
# type: <class 'pathlib.Path'>
configs_dir = "/home/jandu/repos/NBV/.configs"
# type: <class 'pathlib.Path'>
url_dir = "/home/jandu/repos/NBV/.data/aria_download_urls"
# type: <class 'pathlib.Path'>
metadata_cache = "/home/jandu/repos/NBV/.data/ase_metadata.json"
# type: <class 'pathlib.Path'>
ase_meshes = "/home/jandu/repos/NBV/.data/ase_meshes"
# type: <class 'pathlib.Path'>
processed_meshes = "/home/jandu/repos/NBV/.data/ase_meshes_processed"
# type: <class 'pathlib.Path'>
external_dir = "/home/jandu/repos/NBV/external"
# type: <class 'oracle_rri.lightning.lit_trainer_factory.TrainerFactoryConfig'>

[trainer_config]
# type: <class 'bool'>
is_debug = false
# type: <class 'bool'>
fast_dev_run = false
# type: <class 'str'>
accelerator = "auto"
# type: int | str | collections.abc.Sequence[int]
devices = "auto"
# type: str | None
strategy = "auto"
# type: int | None
max_epochs = 10
# type: str | int
precision = "32"
# type: str | None
tf32_matmul_precision = "medium"
# type: <class 'int'>
accumulate_grad_batches = 1
# type: <class 'int'>
log_every_n_steps = 1
# type: <class 'int'>
check_val_every_n_epoch = 1
# type: <class 'bool'>
enable_model_summary = true
# type: <class 'oracle_rri.lightning.lit_trainer_callbacks.TrainerCallbacksConfig'>
use_wandb = true

    [trainer_config.callbacks]
    # type: <class 'bool'>
    use_model_checkpoint = true
    # type: <class 'str'>
    checkpoint_monitor = "val_loss"
    # type: <class 'str'>
    checkpoint_mode = "min"
    # type: pathlib.Path | None
    checkpoint_dir = "/home/jandu/repos/NBV/.logs/vin/checkpoints"
    # type: <class 'str'>
    checkpoint_filename = "epoch={epoch}-step={step}-val_loss={val_loss:.4f}"
    # type: <class 'int'>
    checkpoint_save_top_k = 1
    # type: <class 'bool'>
    checkpoint_auto_insert_metric_name = false
    # type: <class 'bool'>
    use_early_stopping = false
    # type: <class 'str'>
    early_stopping_monitor = "val_loss"
    # type: <class 'str'>
    early_stopping_mode = "min"
    # type: <class 'int'>
    early_stopping_patience = 5
    # type: <class 'bool'>
    use_lr_monitor = true
    # type: <class 'str'>
    lr_logging_interval = "epoch"
    # type: <class 'bool'>
    use_rich_progress_bar = false
    # type: <class 'bool'>
    use_tqdm_progress_bar = true
    # type: <class 'int'>
    tqdm_refresh_rate = 1
    # type: <class 'bool'>
    use_rich_model_summary = true
    # type: <class 'int'>
    rich_summary_max_depth = 1
    # type: <class 'bool'>
    use_backbone_finetuning = false
    # type: <class 'int'>
    backbone_unfreeze_at_epoch = 10
    # type: <class 'bool'>
    backbone_train_bn = true
    # type: <class 'bool'>
    use_timer = false
    # type: <class 'str'>
    timer_interval = "step"
    # type: <class 'bool'>
    # type: <class 'oracle_rri.configs.wandb_config.WandbConfig'>

    [trainer_config.wandb_config]
    # type: str | None
    name = "R2025-12-17_12-47-27"
    # type: <class 'str'>
    project = "oracle-rri"
    # type: <class 'bool'>
    offline = false
    # type: bool | str
    log_model = "all"
    # type: <class 'oracle_rri.lightning.lit_datamodule.VinDataModuleConfig'>

[datamodule_config]
# type: <class 'oracle_rri.data.efm_dataset.AseEfmDatasetConfig'>
max_attempts_per_batch = 50
num_workers            = 0
persistent_workers     = false
verbosity              = 1
is_debug               = false

    [datamodule_config.train_dataset]
    # type: <class 'oracle_rri.configs.path_config.PathConfig'>
    atek_variant = "efm"

    [datamodule_config.labeler]
    # type: <class 'oracle_rri.pose_generation.candidate_generation.CandidateViewGeneratorConfig'>
    backprojection_stride = 1

        [datamodule_config.labeler.generator]
        # type: Literal[rgb, slaml, slamr]
        camera_label = "rgb"
        # type: <class 'int'>
        num_samples = 32
        # type: <class 'float'>
        oversample_factor = 1.5
        # type: <class 'int'>
        max_resamples = 2
        # type: <class 'bool'>
        align_to_gravity = true
        # type: <class 'float'>
        min_radius = 0.6
        # type: <class 'float'>
        max_radius = 3.0
        # type: <class 'float'>
        min_elev_deg = -15.0
        # type: <class 'float'>
        max_elev_deg = 25.0
        # type: <class 'float'>
        delta_azimuth_deg = 170.0
        # type: <enum 'SamplingStrategy'>
        sampling_strategy = "uniform_sphere"
        # type: <class 'float'>
        kappa = 4.0
        # type: <class 'float'>
        min_distance_to_mesh = 0.4
        # type: <class 'bool'>
        ensure_collision_free = true
        # type: <class 'bool'>
        ensure_free_space = true
        # type: <enum 'CollisionBackend'>
        collision_backend = "pytorch3d"
        # type: <class 'int'>
        ray_subsample = 128
        # type: <class 'float'>
        step_clearance = 0.1
        # type: <class 'torch.device'>
        device = "cuda"
        # type: <enum 'Verbosity'>
        verbosity = 2
        # type: <class 'bool'>
        is_debug = false
        # type: <class 'bool'>
        collect_rule_masks = false
        # type: <class 'bool'>
        collect_debug_stats = false
        # type: <enum 'ViewDirectionMode'>
        view_direction_mode = "radial_away"
        # type: float | None
        view_kappa = 4.0
        # type: <class 'float'>
        view_max_angle_deg = 0.0
        # type: float | None
        view_max_azimuth_deg = 60.0
        # type: float | None
        view_max_elevation_deg = 30.0
        # type: <class 'float'>
        view_roll_jitter_deg = 0.0
        # type: int | None
        seed = 0
        # type: <class 'oracle_rri.rendering.candidate_depth_renderer.CandidateDepthRendererConfig'>

        [datamodule_config.labeler.depth]
        # type: <class 'oracle_rri.rendering.pytorch3d_depth_renderer.Pytorch3DDepthRendererConfig'>
        max_candidates_final = 16
        oversample_factor    = 1.0
        verbosity            = 2
        is_debug             = false

            [datamodule_config.labeler.depth.renderer]
            # type: <class 'str'>
            device = "cuda"
            # type: <class 'float'>
            zfar = 20.0
            # type: <class 'float'>
            znear = 0.001
            # type: <class 'bool'>
            cull_backfaces = true
            # type: <class 'float'>
            blur_radius = 0.0
            # type: int | None
            bin_size = 0
            # type: Literal[float32, float16, bfloat16]
            dtype = "float32"
            # type: <enum 'Verbosity'>
            verbosity = 2
            # type: <class 'int'>
            # type: <class 'float'>
            # type: <enum 'Verbosity'>
            # type: <class 'bool'>
            # type: <class 'oracle_rri.rri_metrics.oracle_rri.OracleRRIConfig'>

        [datamodule_config.labeler.oracle]
        # type: <class 'int'>
        num_gt_samples = 20000
        # type: <enum 'DistanceAggregation'>
        reduction = "mean"
        # type: <class 'int'>
        # type: <class 'int'>
        # type: <class 'int'>
        # type: <class 'bool'>
        # type: <enum 'Verbosity'>
        # type: <class 'bool'>
        # type: <class 'oracle_rri.lightning.lit_module.VinLightningModuleConfig'>

[module_config]
# type: <class 'oracle_rri.vin.model.VinModelConfig'>
num_classes         = 15
binner_fit_snippets = 2
binner_tanh_scale   = 1.0
binner_max_attempts = 25
save_binner         = true
binner_path         = "/home/jandu/repos/NBV/.logs/vin/rri_binner.json"

    [module_config.vin]
    # type: <class 'oracle_rri.vin.backbone_evl.EvlBackboneConfig'>
    pose_encoding_mode = "shell_sh"
    use_occ_feat       = true
    use_obb_feat       = true
    use_global_pool    = true
    use_local_sample   = true

        [module_config.vin.backbone]
        # type: <class 'oracle_rri.configs.path_config.PathConfig'>
        model_cfg  = "/home/jandu/repos/NBV/.configs/evl_inf_desktop.yaml"
        model_ckpt = "/home/jandu/repos/NBV/.logs/ckpts/model_lite.pth"
        device     = "cuda"
        freeze     = true

            [module_config.vin.backbone.paths]
            # type: <class 'pathlib.Path'>
            root = "/home/jandu/repos/NBV"
            # type: <class 'pathlib.Path'>
            data_root = "/home/jandu/repos/NBV/.data"
            # type: <class 'pathlib.Path'>
            checkpoints = "/home/jandu/repos/NBV/.logs/checkpoints"
            # type: <class 'pathlib.Path'>
            wandb = "/home/jandu/repos/NBV/.logs/wandb"
            # type: <class 'pathlib.Path'>
            configs_dir = "/home/jandu/repos/NBV/.configs"
            # type: <class 'pathlib.Path'>
            url_dir = "/home/jandu/repos/NBV/.data/aria_download_urls"
            # type: <class 'pathlib.Path'>
            metadata_cache = "/home/jandu/repos/NBV/.data/ase_metadata.json"
            # type: <class 'pathlib.Path'>
            ase_meshes = "/home/jandu/repos/NBV/.data/ase_meshes"
            # type: <class 'pathlib.Path'>
            processed_meshes = "/home/jandu/repos/NBV/.data/ase_meshes_processed"
            # type: <class 'pathlib.Path'>
            external_dir = "/home/jandu/repos/NBV/external"
            # type: <class 'pathlib.Path'>
            # type: <class 'pathlib.Path'>
            # type: <class 'torch.device'>
            # type: <class 'bool'>
            # type: Literal[shell_sh, lff6d]
            # type: <class 'oracle_rri.vin.spherical_encoding.ShellShPoseEncoderConfig'>

        [module_config.vin.pose_encoder_sh]
        # type: <class 'int'>
        lmax = 3
        # type: <class 'int'>
        sh_out_dim = 32
        # type: <class 'int'>
        radius_num_frequencies = 8
        # type: <class 'int'>
        radius_out_dim = 32
        # type: <class 'bool'>
        radius_include_input = true
        # type: <class 'bool'>
