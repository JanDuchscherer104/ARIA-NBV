run_mode = "optuna"

[datamodule_config]
# Offline cache, strict vin_snippet_cache enforcement (VIN snippet cache required).
num_workers        = 0
batch_size         = 2
persistent_workers = false
shuffle            = true
use_train_as_val   = false

    [datamodule_config.source]
    kind        = "offline_cache"
    train_split = "train"
    val_split   = "val"

        [datamodule_config.source.cache]
        load_backbone = true
        include_efm_snippet = true
        include_gt_mesh = false
        load_candidates = false
        load_depths = true
        load_candidate_pcs = false
        vin_snippet_cache_mode = "required"
        vin_snippet_cache_allow_subset = true
        semidense_include_obs_count = true
        limit = 20
        efm_keep_keys = [
            # EfmTrajectory
            "pose/t_world_rig",
            "pose/time_ns",
            "pose/gravity_in_world",
            # SemiDense Point Cloud
            "points/p3s_world",
            "points/dist_std",
            "points/inv_dist_std",
            "points/time_ns",
            "scene/points/vol_min",
            "scene/points/vol_max",
            "points/lengths",
        ]
        backbone_keep_fields = [
            "t_world_voxel",
            "voxel_extent",
            "occ_pr",
            "occ_input",
            "counts",
            "cent_pr",
            "free_input",
            "pts_world",
        ]

            [datamodule_config.source.cache.vin_snippet_cache]
            cache_dir = "vin_snippet_cache"

[trainer_config]
enable_validation       = false
check_val_every_n_epoch = 1
num_sanity_val_steps    = 0
fast_dev_run            = false
max_epochs              = 1
limit_train_batches     = 10
limit_val_batches       = 0
accelerator             = "auto"
devices                 = "auto"
log_every_n_steps       = 1
gradient_clip_val       = 3.0
use_wandb               = false

    [trainer_config.callbacks]
    use_early_stopping     = false
    use_model_checkpoint   = true
    checkpoint_monitor     = "val/loss"
    checkpoint_mode        = "min"
    checkpoint_save_top_k  = 1
    use_lr_monitor         = true
    lr_logging_interval    = "step"
    use_rich_progress_bar  = true
    use_tqdm_progress_bar  = false
    tqdm_refresh_rate      = 1
    use_rich_model_summary = true
    rich_summary_max_depth = 4

[module_config]
num_classes                    = 15
save_binner                    = true
binner_path                    = ".logs/vin/rri_binner.json"
aux_regression_loss            = "huber"
aux_regression_weight          = 10.0
aux_regression_weight_gamma    = 0.90
aux_regression_weight_min      = 0.1
log_grad_norms                 = true
coral_bias_init                = "prior_logits"
coral_loss_variant             = "coral"
coral_balance_source           = "binner"
coverage_weight_mode           = "voxel"
coverage_weight_floor          = 0.2
coverage_weight_power          = 1.0
coverage_weight_strength_start = 0.6
coverage_weight_strength_end   = 0.0
coverage_weight_schedule       = "linear"
coverage_weight_interval       = "epoch"
coverage_weight_anneal_epochs  = 5
coverage_weight_apply_aux      = true

    [module_config.optimizer]
    learning_rate = 3e-4
    weight_decay  = 1e-3

    [module_config.lr_scheduler]
    max_lr          = 3e-4
    pct_start       = 0.15  # max lr reached at 15% of training
    anneal_strategy = "cos"
    div_factor      = 15.0
    # OneCycleLR: final_lr = max_lr / (div_factor * final_div_factor)
    final_div_factor = 5e3

[optuna_config]
study_name = "vin-v2-mock-sweep"
monitor    = "train/loss"
n_trials   = 10
sampler    = "tpe"
pruner     = "median"

    [module_config.vin]
    # VIN v2 core knobs
    num_classes = 15
    head_hidden_dim = 192
    head_num_layers = 3
    head_dropout = 0.05
    head_activation = "gelu"
    coral_preinit_bias = true
    field_dim = 16
    field_gn_groups = 4
    apply_cw90_correction = true
    global_pool_grid_size = 6
    enable_semidense_frustum = true
    semidense_include_obs_count = true
    use_point_encoder = false
    use_traj_encoder = true
    use_voxel_valid_frac_feature = true
    scene_field_channels = [
        "occ_pr",
        "occ_input",
        "counts_norm",
        "cent_pr",
        "free_input",
        "new_surface_prior",
    ]

        [module_config.vin.backbone]
        model_cfg     = ".configs/evl_inf_desktop.yaml"
        model_ckpt    = ".logs/ckpts/model_lite.pth"
        device        = "cuda"
        freeze        = true
        features_mode = "heads"

        [module_config.vin.pose_encoder]
        kind                 = "r6d_lff"
        pose_scale_init      = [1.0, 1.0]
        pose_scale_learnable = true
        pose_scale_eps       = 1e-6

            [module_config.vin.pose_encoder.pose_encoder_lff]
            input_dim     = 9     # 3 for position, 6 for rotation matrix
            fourier_dim   = 64
            hidden_dim    = 128
            output_dim    = 32
            gamma         = 1.0
            include_input = false

        [module_config.vin.pos_grid_encoder_lff]
        input_dim     = 3     # 3 for position
        fourier_dim   = 24
        hidden_dim    = 16
        output_dim    = 12
        gamma         = 1.0
        include_input = false

        # [module_config.vin.point_encoder]
        # # PointNeXt-S semidense encoder (uses include_inv_dist_std in VinModelV2)
        # cfg_path        = "PointNeXt/cfgs/s3dis/pointnext-s.yaml"
        # checkpoint_path = "s3dis-train-pointnext-s-ngpus1-seed1742-20220525-162639-Gz4ViiL95b6KP9MMH2ytG3_ckpt_best.pth"
        # out_dim         = 128
        # max_points      = 3000
        # freeze          = true
        # strict_load     = false

        [module_config.vin.traj_encoder]
        pool_mode = "mean"

            [module_config.vin.traj_encoder.pose_encoder]
            kind                 = "r6d_lff"
            pose_scale_init      = [1.0, 1.0]
            pose_scale_learnable = true
            pose_scale_eps       = 1e-6

                [module_config.vin.traj_encoder.pose_encoder.pose_encoder_lff]
                input_dim     = 9
                fourier_dim   = 64
                hidden_dim    = 128
                output_dim    = 32
                gamma         = 1.0
                include_input = false
