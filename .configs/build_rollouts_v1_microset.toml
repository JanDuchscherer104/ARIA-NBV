max_samples = 1
max_targets_per_sample = 1
require_label_valid = true
log_timing = true
verbosity = 1

[source]
split = "all"
limit = 1
return_format = "sample"
include_efm_snippet = true
include_gt_mesh = true
load_backbone = true
load_candidates = false
load_depths = false
load_candidate_pcs = false
load_gt_obbs = true
load_detected_obbs = true
load_trajectory_metadata = true
map_location = "cpu"
verbosity = 1

[source.store]
store_dir = "vin_offline"

[target_selector]
k = 3
source_mode = "v1_actor_visible"
policy = "greedy_top_k"
match_gt = true

[candidate_mixture.base]
num_samples = 32
oversample_factor = 1.0
ensure_collision_free = true
ensure_free_space = true
min_distance_to_mesh = 0.2
device = "cpu"
verbosity = 1
collect_rule_masks = true
view_max_azimuth_deg = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name = "target_point"
count = 12
strategy = "target_point"
view_max_azimuth_deg = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name = "radial_towards"
count = 8
strategy = "radial_towards"
view_max_azimuth_deg = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name = "radial_away"
count = 8
strategy = "radial_away"
view_max_azimuth_deg = 0.0
view_max_elevation_deg = 0.0

[[candidate_mixture.components]]
name = "forward_rig"
count = 4
strategy = "forward_rig"
view_max_azimuth_deg = 0.0
view_max_elevation_deg = 0.0

[target_scorer]
backprojection_stride = 12
target_crop_margin_m = 0.05
min_current_target_points = 1
include_scene_rri = false
log_timing = true
verbosity = 1

[target_scorer.depth]
device = "cpu"
max_candidates_final = 32
resolution_scale = 0.2
verbosity = 1

[store]
store_dir = "rollouts_v1_microset.zarr"
target_protocol_version = "v1_observed"
field_retention_policy = "compact_selected_heavy"
source_offline_store_version = "vin-offline-v7"
split_manifest_hash = "configured-at-runtime"
discount_gamma = 1.0

[[recipes]]
name = "oracle_lookahead"
selection_policy = "oracle_greedy"
horizon = 2
branch_factor = 2
beam_width = 2
stochastic_branch_factors = [1, 2]
stochastic_branch_probabilities = [0.75, 0.25]
seed = 0
