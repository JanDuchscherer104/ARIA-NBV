[dataset]

    [dataset.offline]
    split                  = "all"
    include_efm_snippet    = true
    include_gt_mesh        = true
    load_backbone          = true
    load_candidates        = true
    load_depths            = true
    load_candidate_pcs     = true
    return_format          = "sample"
    map_location           = "cpu"

        [dataset.offline.store]
        store_dir = "vin_offline"

[selection]
split = "val"
index = 0

[output]
mode                = "save"
application_id      = "aria-nbv-rerun-inspector"
save_path           = ".logs/rerun/offline_inspector.rrd"
spawn_port          = 9876
spawn_memory_limit  = "75%"
hide_welcome_screen = true

[geometry]
frustum_scale           = 0.35
reference_axis_length   = 0.45
semidense_radius        = 0.015
candidate_center_radius = 0.035
candidate_point_radius  = 0.01
trajectory_radius       = 0.02
mesh_alpha              = 18

[performance]
max_semidense_points = 50000
max_candidate_points = 20000
seed                 = 0
verbosity            = "normal"

[candidate]
subset_mode       = "all"
subset_top_k      = 5
subset_indices    = []
selected_strategy = "top_valid_oracle"

[rollout_plots]
enabled          = true
branch_scope     = "same_source_target"
candidate_top_k  = 5
log_all_candidates = false

[efm_voxels]
enabled              = true
log_occ_pr           = false
log_cent_pr          = true
log_cent_pr_nms      = true
occ_threshold        = 0.95
cent_threshold       = 0.03
cent_nms_threshold   = 0.01
max_points_per_field = 10000
point_radius         = 0.025

[ase_keyframes]
frame_policy = "first_last"

[primitives]
log_semidense          = true
log_reference_pose     = true
log_candidate_frusta   = true
log_top_oracle_frustum = true
log_invalid_frusta     = true
log_candidate_centers  = true
log_metadata           = true
log_mesh               = true
log_candidate_points   = false
log_gt_mesh            = true
log_gt_obbs            = true
log_detected_obbs      = true
show_gt_obb_labels     = true
show_detected_obb_labels = false
log_gt_trajectory      = true
log_candidate_depths   = false
log_rgb_keyframes      = false
log_depth_keyframes    = false
log_efm_voxels         = true
