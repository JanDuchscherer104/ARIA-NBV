name: aria-nbv
channels:
  - nvidia/label/cuda-12.1.1
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - ninja
  - python=3.11
  - pip
  - cuda
  - anaconda::cudnn
  - gcc=12.1
  - gxx=12.1

  # Only uv for package management - everything else via pyproject.toml
  - pip:
    - uv>=0.9.4