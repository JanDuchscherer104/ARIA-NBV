# ASE Download Configuration Example
#
# Usage:
#   python -m oracle_rri.data_handling --config-path download_config.toml

[oracle_rri.data_handling.downloader]
# Paths
url_dir             = ".data/aria_download_urls"
output_dir          = ".data"
metadata_cache_path = ".data/ase_metadata.json"

# Download options
verbose = true

# Example: Override via environment variables
# ASE_DOWNLOAD_OUTPUT_DIR=/mnt/data python -m oracle_rri.data_handling --config-path download_config.toml
