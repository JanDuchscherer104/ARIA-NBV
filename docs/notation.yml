# Canonical shared notation registry for Quarto shortcodes and generated Typst lookup helpers.
# Typst paper/slides continue to use docs/typst/shared/macros.typ directly.
symbols:
  oracle.rri:
    tex: '\mathrm{RRI}'
    typst: '#symb.oracle.rri'
  oracle.points:
    tex: '\mathcal{P}'
    typst: '#symb.oracle.points'
  oracle.points_q:
    tex: '\mathcal{P}_q'
    typst: '#symb.oracle.points_q'
  oracle.candidates:
    tex: '\mathcal{Q}'
    typst: '#symb.oracle.candidates'
  oracle.candidates_t:
    tex: '\mathcal{Q}_t'
    typst: '#symb.oracle.candidates_t'
  oracle.candidate_qti:
    tex: 'q_{t,i}'
    typst: '#symb.oracle.candidate_qti'
  oracle.depth_q:
    tex: '\boldsymbol{D}_q'
    typst: '#symb.oracle.depth_q'
  oracle.acc:
    tex: 'D_{P\to M}'
    typst: '#symb.oracle.acc'
  oracle.comp:
    tex: 'D_{M\to P}'
    typst: '#symb.oracle.comp'
  rri.cd_value:
    tex: 'D'
    typst: '#eqs.rri.cd'
  ase.mesh:
    tex: '\mathcal{M}^{\mathrm{GT}}'
    typst: '#symb.ase.mesh'
  ase.mesh_target:
    tex: '\mathcal{M}_e^{\mathrm{GT}}'
    typst: '#symb.ase.mesh_target'
  ase.faces:
    tex: '\mathcal{F}^{\mathrm{GT}}'
    typst: '#symb.ase.faces'
  ase.traj:
    tex: '\boldsymbol{T}_{\mathrm{rig}}^{\mathrm{w}}(t)'
    typst: '#symb.ase.traj'
  ase.traj_final:
    tex: '\boldsymbol{T}_{\mathrm{rig}}^{\mathrm{w}}(T)'
    typst: '#symb.ase.traj_final'
  vin.rri:
    tex: 'r'
    typst: '#symb.vin.rri'
  vin.rri_hat:
    tex: '\hat{r}'
    typst: '#symb.vin.rri_hat'
  vin.loss:
    tex: '\mathcal{L}'
    typst: '#symb.vin.loss'
  vin.cand_valid:
    tex: 'm'
    typst: '#symb.vin.cand_valid'
  entity.rri_e:
    tex: '\mathrm{RRI}_e'
    typst: '#symb.entity.rri_e'
  rl.s:
    tex: 's'
    typst: '#symb.rl.s'
  rl.a:
    tex: 'a'
    typst: '#symb.rl.a'
  rl.r:
    tex: 'r'
    typst: '#symb.rl.r'
  rl.G:
    tex: 'G'
    typst: '#symb.rl.G'
  rl.mdp_nbv:
    tex: '\mathcal{M}_{\mathrm{NBV}}'
    typst: '#symb.rl.mdp_nbv'
  rl.action_set:
    tex: '\mathcal{A}(s_t)'
    typst: '#symb.rl.action_set'
  rl.transition:
    tex: 'T'
    typst: '#symb.rl.transition'
  rl.s_hist:
    tex: 's_t^{\mathrm{hist}}'
    typst: '#symb.rl.s_hist'
  rl.s_off:
    tex: 's_t^{\mathrm{off}}'
    typst: '#symb.rl.s_off'
  rl.s_cf0:
    tex: 's_t^{\mathrm{cf0}}'
    typst: '#symb.rl.s_cf0'
  rl.s_cf_geom:
    tex: 's_t^{\mathrm{cf+}}'
    typst: '#symb.rl.s_cf_geom'
  rl.s_oracle:
    tex: 's_t^{\mathrm{oracle}}'
    typst: '#symb.rl.s_oracle'
  rl.reward_target:
    tex: 'r_t^e'
    typst: '#symb.rl.reward_target'
  rl.return_h:
    tex: 'G_t^{(H)}'
    typst: '#symb.rl.return_h'
  rl.qh:
    tex: 'Q_H'
    typst: '#symb.rl.qh'
  rl.gamma:
    tex: '\gamma'
    typst: '#symb.rl.gamma'
  rl.H:
    tex: 'H'
    typst: '#symb.rl.H'
  rl.validity_mask:
    tex: 'm_{t,i}'
    typst: '#symb.rl.validity_mask'
  rl.invalid_reason:
    tex: '\rho_{t,i}'
    typst: '#symb.rl.invalid_reason'
  rl.target:
    tex: 'e_t'
    typst: '#symb.rl.target'
  rl.budget:
    tex: 'b_t'
    typst: '#symb.rl.budget'
  rl.acquisition_cost:
    tex: 'C(\tau)'
    typst: '#symb.rl.b'
  shape.Nq:
    tex: 'N_q'
    typst: '#symb.shape.Nq'
  shape.K:
    tex: 'K'
    typst: '#symb.shape.K'

equations:
  rri.cd:
    tex: 'D(\mathcal{P},\mathcal{M}^{\mathrm{GT}})=D_{P\to M}(\mathcal{P},\mathcal{M}^{\mathrm{GT}})+D_{M\to P}(\mathcal{P},\mathcal{M}^{\mathrm{GT}})'
    typst: '#eqs.rri.cd'
  rri.acc:
    tex: 'D_{P\to M}(\mathcal{P},\mathcal{M}^{\mathrm{GT}})=\frac{1}{\lVert\mathcal{P}\rVert}\sum_{\boldsymbol{p}\in\mathcal{P}}\min_{\boldsymbol{f}\in\mathcal{F}^{\mathrm{GT}}} d(\boldsymbol{p},\boldsymbol{f})^2'
    typst: '#eqs.rri.acc'
  rri.comp:
    tex: 'D_{M\to P}(\mathcal{P},\mathcal{M}^{\mathrm{GT}})=\frac{1}{\lVert\mathcal{F}^{\mathrm{GT}}\rVert}\sum_{\boldsymbol{f}\in\mathcal{F}^{\mathrm{GT}}}\min_{\boldsymbol{p}\in\mathcal{P}} d(\boldsymbol{p},\boldsymbol{f})^2'
    typst: '#eqs.rri.comp'
  rri.union:
    tex: '\mathcal{P}_{t\cup q}=\mathcal{P}_t\cup\mathcal{P}_q'
    typst: '#eqs.rri.union'
  rri.rri:
    tex: '\mathrm{RRI}(q)=\frac{D(\mathcal{P}_t,\mathcal{M}^{\mathrm{GT}})-D(\mathcal{P}_t\cup\mathcal{P}_q,\mathcal{M}^{\mathrm{GT}})}{D(\mathcal{P}_t,\mathcal{M}^{\mathrm{GT}})+\varepsilon}'
    typst: '#eqs.rri.rri'
  rri.target_rri:
    tex: '\mathrm{RRI}_e(q)=\frac{D(\mathcal{P}_t^e,\mathcal{M}_e^{\mathrm{GT}})-D(\mathcal{P}_t^e\cup\mathcal{P}_q^e,\mathcal{M}_e^{\mathrm{GT}})}{D(\mathcal{P}_t^e,\mathcal{M}_e^{\mathrm{GT}})+\varepsilon}'
    typst: '#eqs.rri.target_rri'
  rri.greedy:
    tex: 'q^*=\operatorname*{argmax}_{q\in\mathcal{Q}}\mathrm{RRI}(q)'
    typst: '#eqs.rri.greedy'
  binning.edges:
    tex: 'e_k=\operatorname{Quantile}(\{r_i\}_{i=1}^{N}, k/K),\quad k\in\{1,\ldots,K-1\}'
    typst: '#eqs.binning.edges'
  binning.label:
    tex: 'y(r)=\sum_{k=1}^{K-1}\mathbb{1}[r>e_k],\quad y(r)\in\{0,\ldots,K-1\}'
    typst: '#eqs.binning.label'
  binning.levels:
    tex: 't_k=\mathbb{1}[y>k],\quad k\in\{0,\ldots,K-2\}'
    typst: '#eqs.binning.levels'
  coral.loss:
    tex: '\mathcal{L}_{\mathrm{coral}}(y,\boldsymbol{p})=-\sum_{k=0}^{K-2}\left(t_k\log p_k+(1-t_k)\log(1-p_k)\right)'
    typst: '#eqs.coral.loss'
  coral.rel_random:
    tex: '\mathcal{L}_{\mathrm{rel}}=\mathcal{L}_{\mathrm{coral}}/((K-1)\log 2)'
    typst: '#eqs.coral.rel_random'
  vin.loss_total:
    tex: '\mathcal{L}=\mathcal{L}_{\mathrm{coral}}+\lambda\mathcal{L}_{\mathrm{reg}}'
    typst: '#eqs.vin.loss_total'
  vin.aux_reg_mse:
    tex: '\mathcal{L}_{\mathrm{reg}}=\frac{1}{N}\sum_i(\hat{r}_i-r_i)^2'
    typst: '#eqs.vin.aux_reg_mse'
  metrics.spearman:
    tex: '\rho=\operatorname{corr}(\operatorname{rank}(\hat{r}_i),\operatorname{rank}(r_i))'
    typst: '#eqs.metrics.spearman'
  metrics.topk_acc:
    tex: '\mathrm{TopKAcc}(k)=\frac{1}{N}\sum_i\mathbb{1}[y_i\in\mathrm{TopK}(\boldsymbol{\pi}_i,k)]'
    typst: '#eqs.metrics.topk_acc'
  metrics.candidate_validity:
    tex: 'm_i=\mathbb{1}[\mathrm{finite}]\mathbb{1}[v_i>0]\mathbb{1}[v_i^{\mathrm{sem}}>0]'
    typst: '#eqs.metrics.candidate_validity'
  rl.mdp:
    tex: '\mathcal{M}=(\mathcal{S},\mathcal{A},P,r,\gamma)'
    typst: '#eqs.rl.mdp'
  rl.nbv_mdp:
    tex: '\mathcal{M}_{\mathrm{NBV}}=(\mathcal{S},\mathcal{A},T,r_e,\gamma,H)'
    typst: '#eqs.rl.nbv_mdp'
  rl.s_hist:
    tex: 's_t^{\mathrm{hist}}=(I_{1:t},T_{1:t},P_{1:t}^{\mathrm{semi}},V^{\mathrm{root}},e_t,b_t)'
    typst: '#eqs.rl.s_hist'
  rl.s_off:
    tex: 's_t^{\mathrm{off}}=(\mathrm{VinSnippetView},\mathcal{Q}_t,N_t,m_{t,i},\ell_{t,i})'
    typst: '#eqs.rl.s_off'
  rl.s_cf0:
    tex: 's_t^{\mathrm{cf0}}=(V^{\mathrm{root}},\mathcal{P}_t,\mathcal{Q}_t,m_{t,i},\rho_{t,i},e_t,b_t)'
    typst: '#eqs.rl.s_cf0'
  rl.s_cf_geom:
    tex: 's_t^{\mathrm{cf+}}=(s_t^{\mathrm{cf0}},D_{1:t}^{\mathrm{sel}},P_{1:t}^{\mathrm{sel}},N_{1:t}^{\mathrm{sel}})'
    typst: '#eqs.rl.s_cf_geom'
  rl.s_oracle:
    tex: 's_t^{\mathrm{oracle}}=(s_t^{\mathrm{cf+}},\mathcal{M}^{\mathrm{GT}},\mathcal{M}_e^{\mathrm{GT}},\{D_{t,i}^{\mathrm{GT}},\mathcal{P}_{t,i}^{\mathrm{GT}},\mathrm{RRI}_{t,i}\}_{i=1}^{N_t})'
    typst: '#eqs.rl.s_oracle'
  rl.finite_action_set:
    tex: '\mathcal{Q}_t=\{q_{t,i}\}_{i=1}^{N_t},\quad \mathcal{A}(s_t)=\{i\in\{1,\ldots,N_t\}:m_{t,i}=1\},\quad q_t=q_{t,a_t}'
    typst: '#eqs.rl.finite_action_set'
  rl.counterfactual_transition:
    tex: '\mathcal{P}_{t+1}=\mathcal{P}_t\cup\mathcal{P}_{q_t}'
    typst: '#eqs.rl.counterfactual_transition'
  rl.target_rri_reward:
    tex: 'r_t^e=\mathrm{RRI}_e(q_t\mid \mathcal{P}_t,\mathcal{M}_e^{\mathrm{GT}})'
    typst: '#eqs.rl.target_rri_reward'
  rl.finite_horizon_return:
    tex: 'G_t^{(H)}=\sum_{k=0}^{H-1}\gamma^k r_{t+k}^e'
    typst: '#eqs.rl.finite_horizon_return'
  rl.q_h:
    tex: 'Q_H(s_t^{\mathrm{cf0}},a_t)=\mathbb{E}\left[G_t^{(H)}\mid s_t=s_t^{\mathrm{cf0}},a_t\right]'
    typst: '#eqs.rl.q_h'
  rl.reward_geom:
    tex: 'r_t^{\mathrm{geom}}=\log(D(\mathcal{P}_t,\mathcal{M}^{\mathrm{GT}})+\varepsilon)-\log(D(\mathcal{P}_{t+1},\mathcal{M}^{\mathrm{GT}})+\varepsilon)-\alpha\mathbb{1}[\mathrm{collision}(a_t)]-\beta c(a_t)'
    typst: '#eqs.rl.reward_geom'
  rl.q_backup:
    tex: 'y_t^Q=r_t+\gamma V(s_{t+1})'
    typst: '#eqs.rl.q_backup'
  action.space:
    tex: '\mathcal{A}^{\mathrm{cont}}\subset\mathbb{R}^3\times \operatorname{SO}(2)'
    typst: '#eqs.action.space'
  entity.objective:
    tex: '\mathrm{RRI}_{\mathrm{total}}(q)=\sum_{e\in\mathcal{E}}w_e\mathrm{RRI}_e+\lambda_{\mathrm{scene}}\mathrm{RRI}'
    typst: '#eqs.entity.objective'
