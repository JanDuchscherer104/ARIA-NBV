run_mode  = "train"
ckpt_path = "epoch=20-step=1869-train-loss=6.2684.ckpt"
[datamodule_config]
# Offline cache usage
num_workers        = 16
batch_size         = 16
persistent_workers = false
shuffle            = true
use_train_as_val   = false
shuffle_candidates = true

    [datamodule_config.source]
    kind        = "offline_cache"
    train_split = "train"
    val_split   = "val"

        [datamodule_config.source.cache]
        load_backbone = true
        include_efm_snippet = true
        include_gt_mesh = false
        load_candidates = false
        load_depths = true
        load_candidate_pcs = false
        semidense_include_obs_count = true
        efm_keep_keys = [
            # EfmTrajectory
            'pose/t_world_rig',
            'pose/time_ns',
            'pose/gravity_in_world',
            # SemiDense Point Cloud
            'points/p3s_world',
            'points/dist_std',
            'points/inv_dist_std',
            'points/time_ns',
            'scene/points/vol_min',
            'scene/points/vol_max',
            'points/lengths',
        ]
        backbone_keep_fields = [
            "t_world_voxel",
            "voxel_extent",
            "occ_pr",
            "occ_input",
            "counts",
            "cent_pr",
            "free_input",
            "pts_world",
        ]

            [datamodule_config.source.cache.vin_snippet_cache]
            # Precomputed minimal VinSnippetView cache (collapsed semidense + trajectory).
            # Build via: `uv run nbv-cache-vin-snippets` (defaults to `.configs/offline_only.toml`)
            # or explicitly: `uv run nbv-cache-vin-snippets --config-path ./.configs/offline_only.toml`
            cache_dir = "vin_snippet_cache"

[trainer_config]
# Make sure validation runs
enable_validation       = true
check_val_every_n_epoch = 1
num_sanity_val_steps    = 2
fast_dev_run            = false
max_epochs              = 55
accelerator             = "auto"
devices                 = "auto"
log_every_n_steps       = 1
gradient_clip_val       = 4.0
use_wandb               = true

    [trainer_config.callbacks]
    use_early_stopping      = true
    use_model_checkpoint    = true
    checkpoint_monitor      = "val/loss"
    checkpoint_mode         = "min"
    checkpoint_save_top_k   = 1
    early_stopping_monitor  = "val/loss"
    early_stopping_mode     = "min"
    early_stopping_patience = 15
    use_lr_monitor          = true
    lr_logging_interval     = "step"
    use_rich_progress_bar   = true
    use_tqdm_progress_bar   = false
    tqdm_refresh_rate       = 1
    use_rich_model_summary  = true
    rich_summary_max_depth  = 4

    # [trainer_config.wandb_config]
    # run_id = "1wz4g6ex"

[module_config]
num_classes                    = 15
save_binner                    = true
binner_path                    = ".logs/vin/rri_binner.json"
aux_regression_loss            = "none"
aux_regression_weight          = 10.0
aux_regression_weight_gamma    = 0.90
aux_regression_weight_min      = 0.1
coral_bias_init                = "prior_logits"
coral_loss_variant             = "coral"
coral_balance_source           = "binner"
coverage_weight_mode           = "voxel"
coverage_weight_floor          = 0.2
coverage_weight_power          = 1.0
coverage_weight_strength_start = 0.6
coverage_weight_strength_end   = 0.0
coverage_weight_schedule       = "linear"
coverage_weight_interval       = "epoch"
coverage_weight_anneal_epochs  = 6
coverage_weight_apply_aux      = true

    [module_config.grad_norms]
    enabled = true

    [module_config.optimizer]
    learning_rate = 0.0008
    weight_decay  = 0.013244782071249196

    [module_config.lr_scheduler]
    factor         = 0.4
    patience       = 2
    threshold      = 1e-3
    threshold_mode = "rel"
    cooldown       = 1
    min_lr         = 8e-7
    monitor        = "val/loss"
    interval       = "epoch"
    frequency      = 1


    # [module_config.lr_scheduler]
    # max_lr          = 0.00018 #05             #0.0001830227950357318
    # pct_start       = 0.0     #0.2               # 0.1230097043157138
    # base_momentum   = 0.85
    # max_momentum    = 0.95
    # anneal_strategy = "cos"
    # div_factor      = 45
    # # OneCycleLR: final_lr = max_lr / (div_factor * final_div_factor)
    # final_div_factor = 316

    [module_config.vin]
    # VINv3 (VIN-Core) knobs
    num_classes = 15
    head_hidden_dim = 192
    head_num_layers = 2
    head_dropout = 0.031317082333434145
    coral_preinit_bias = true
    field_dim = 24
    field_gn_groups = 7
    apply_cw90_correction = false
    global_pool_grid_size = 5
    semidense_proj_grid_size = 12
    semidense_proj_max_points = 16384
    use_voxel_valid_frac_gate = false
    scene_field_channels = [
        "occ_pr",
        "occ_input",
        "counts_norm",
        "cent_pr",
        "free_input",
        "new_surface_prior",
    ]

        [module_config.vin.backbone]
        model_cfg     = ".configs/evl_inf_desktop.yaml"
        model_ckpt    = ".logs/ckpts/model_lite.pth"
        device        = "cuda"
        freeze        = true
        features_mode = "heads"

        [module_config.vin.pose_encoder]
        kind                 = "r6d_lff"
        pose_scale_init      = [1.0, 1.0]
        pose_scale_learnable = true
        pose_scale_eps       = 1e-6

            [module_config.vin.pose_encoder.pose_encoder_lff]
            input_dim     = 9     # 3 for position, 6 for rotation matrix
            fourier_dim   = 64
            hidden_dim    = 128
            output_dim    = 32
            gamma         = 1.0
            include_input = false

        [module_config.vin.pos_grid_encoder_lff]
        input_dim     = 3     # 3 for position
        fourier_dim   = 24
        hidden_dim    = 16
        output_dim    = 12
        gamma         = 1.0
        include_input = false
