# Paper figure export configuration (oracle label pipeline).
#
# Intended usage:
# - Use this config in the Streamlit dashboard to reproduce the paper figures.
# - Optionally reuse it for offline figure export scripts / notebooks.
#
# Notes:
# - Set `dataset.scene_ids` (and optionally `dataset.snippet_key_filter`) to pin
#   the exact snippet used for screenshots.
# - The oracle RRI implementation computes point↔mesh distances over the cropped
#   mesh triangles (mean reduction); no mesh sampling parameter is used.

[dataset]
batch_size   = 1
wds_shuffle  = false
wds_repeat   = false
load_meshes  = true
require_mesh = true

# Pin a specific example snippet (recommended for reproducibility).
scene_ids = ["81286"]
# Speed up loading by restricting shards (optional, but recommended).
snippet_ids = ["shards-0003"]
# Filters `__key__` / sample IDs by suffix match; "000024" matches
# "AriaSyntheticEnvironment_81286_AtekDataSample_000024".
snippet_key_filter = ["000024"]

[labeler]
device                = "auto"
backprojection_stride = 1

  [labeler.generator]
  device                 = "auto"
  camera_label           = "rgb"
  num_samples            = 60
  oversample_factor      = 2.0
  max_resamples          = 2
  align_to_gravity       = true
  min_radius             = 0.5
  max_radius             = 1.8
  min_elev_deg           = -20.0
  max_elev_deg           = 25.0
  delta_azimuth_deg      = 170.0
  sampling_strategy      = "uniform_sphere"
  kappa                  = 4.0
  min_distance_to_mesh   = 0.2
  ensure_collision_free  = true
  ensure_free_space      = true
  collision_backend      = "pytorch3d"
  ray_subsample          = 32
  step_clearance         = 0.1
  view_direction_mode    = "radial_away"
  view_max_azimuth_deg   = 60.0
  view_max_elevation_deg = 30.0
  view_roll_jitter_deg   = 0.0
  seed                   = 0

  [labeler.depth]
  max_candidates_final = 60
  oversample_factor    = 1.0
  resolution_scale     = 0.5

    [labeler.depth.renderer]
    device = "auto"
    znear  = 0.001
    zfar   = 20.0
    # ASE meshes are typically closed surfaces; enable backface culling (default).
    cull_backfaces = true
    blur_radius    = 0.0
    bin_size       = 0
    dtype          = "float32"
