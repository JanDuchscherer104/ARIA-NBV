quartodoc:
  package: aria_nbv
  source_dir: ../aria_nbv
  dir: reference
  out_index: reference/_api_index.md
  sidebar:
    file: reference/_sidebar.yml
    search: true
    style: docked
    collapse-level: 2
  css: reference/_styles-quartodoc.css
  parser: google
  options:
    signature_name: relative
    include_private: false
    include_imports: false
    include_empty: false
    include_attributes: true
    include_classes: true
    include_functions: true
    member_order: source
  sections:
    - title: "Stable Package Surface"
      desc: "Preferred import surfaces for datasets, geometry, rendering, training, and utilities."
      contents:
        - name: data_handling
          include_imports: true
          children: separate
          member_options: &embedded_members
            children: embedded
            include_attributes: true
            include_private: false
            include_imports: false
            member_order: source
        - name: pose_generation
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: rendering
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: rri_metrics
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: lightning
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: configs
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: utils
          include_imports: true
          children: separate
          member_options: *embedded_members
    - title: "VIN Core"
      desc: "Core model modules behind EVL-backed view scoring."
      contents:
        - name: vin.backbone_evl
          children: separate
          member_options: *embedded_members
        - name: vin.model_v3
          children: separate
          member_options: *embedded_members
        - name: vin.pose_encoders
          children: separate
          member_options: *embedded_members
        - name: vin.pose_encoding
          children: separate
          member_options: *embedded_members
        - name: vin.traj_encoder
          children: separate
          member_options: *embedded_members
        - name: vin.types
          children: separate
          member_options: *embedded_members
    - title: "Pipelines"
      desc: "End-to-end orchestration modules that connect the typed data stack to oracle labelling."
      contents:
        - name: pipelines.oracle_rri_labeler
          children: separate
          member_options: *embedded_members


