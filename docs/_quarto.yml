project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - reference/**/*.qmd
    - contents/**/*.qmd
  resources:
    - figures/
    - typst/

metadata-files:
  - reference/_sidebar.yml

shortcodes:
  - _extensions/aria-glossary/aria-glossary.lua

# Global execution defaults (fast iterations; deterministic rebuilds)
execute: # see https://quarto.org/docs/computations/execution-options.html
  freeze: auto      # re-render only when source changes
  cache: true       # cache expensive chunks across renders
  echo: true       # hide code by default (toggle via code-tools below)
  warning: false
  message: false

format:
  html:
    theme:
      light: cosmo
      dark: darkly           # built-in dark variant; auto toggles
    css:
      - reference/_styles-quartodoc.css
      - styles.css
    toc: true
    number-sections: true
    code-copy: true          # copy-to-clipboard buttons for code blocks
    code-tools: true         # per-page "Show code" toggle
    code-fold: show          # collapse long code by default
    mermaid:
      theme: dark                # mermaid diagrams in dark mode

    link-external-newwindow: true
    fig-cap-location: bottom
    tbl-cap-location: top
    lightbox: true           # built-in lightbox for images (Quarto ≥1.4)

# Citations site-wide
bibliography: references.bib   # single source of truth
csl: ieee.csl                             # choose a style now or later
link-citations: true                      # clickable in-text cites

website:
  title: "ARIA-NBV"
  search:
    location: navbar
    type: overlay
  navbar:
    search: true
    left:
      - text: Setup
        href: contents/setup.qmd
      - text: Thesis State
        menu:
          - text: Roadmap
            href: contents/thesis/roadmap.qmd
          - text: Research Questions
            href: contents/thesis/questions.qmd
          - text: M1 Contract Report
            href: contents/thesis/m1_contract_report.qmd
      - text: Aria NBV API
        file: reference/index.qmd
      - text: Resources
        menu:
        - text: Resources (External Links, Repos, Docs, etc.)
          href: contents/resources.qmd
        - text: ASE Dataset
          href: contents/ase_dataset.qmd
        - text: Glossary
          href: contents/glossary.qmd
        - text: Archive
          href: contents/archive/index.qmd
    right:
      - icon: github
        menu:
          - text: "View Source"
            href: https://github.com/JanDuchscherer104/ARIA-NBV
          - text: "Open Issue"
            href: https://github.com/JanDuchscherer104/ARIA-NBV/issues
  sidebar:
    - id: docs
      style: "docked"
      search: true
      collapse-level: 2
      contents:
        - text: Home
          file: index.qmd
        - section: "Literature"
          contents:
            - contents/literature/index.qmd
            - section: "NBV Methods"
              contents:
                - contents/literature/vin_nbv.qmd
                - contents/literature/pb_nbv.qmd
                - contents/literature/hestia.qmd
                - contents/literature/gen_nbv.qmd
                - contents/literature/active_3dgs_nbv.qmd
            - section: "ARIA Ecosystem"
              contents:
                - contents/literature/project_aria.qmd
                - contents/literature/efm3d.qmd
                - contents/literature/scene_script.qmd
            - section: "Rollout, Value, And RL"
              contents:
                - contents/literature/rl_planning.qmd
        - section: "Thesis State"
          contents:
            - contents/thesis/questions.qmd
            - contents/thesis/roadmap.qmd
            - contents/thesis/m1_contract_report.qmd
        - section: "Resources"
          contents:
            - contents/setup.qmd
            - contents/resources.qmd
            - contents/ase_dataset.qmd
            - contents/glossary.qmd
            - contents/archive/index.qmd
        - section: Theory
          contents:
            - contents/theory/nbv_background.qmd
            - contents/theory/rri_theory.qmd
            - contents/theory/rl_planning.qmd
            - contents/theory/surface_metrics.qmd
            - contents/theory/semi-dense-pc.qmd
        - section: "Architecture Diagrams"
          contents:
            - contents/diagrams.qmd
        - section: "Presentations"
          contents:
            - text: "Project Slides 1"
              file: typst/seminar_slides/slides_1.pdf
            - text: "Project Slides 2"
              file: typst/seminar_slides/slides_2.pdf
            - text: "Project Slides 4"
              file: typst/seminar_slides/slides_4.pdf
            - text: "MSc Slides 01 (outlook)"
              file: typst/thesis_slides/slides_thesis_outlook.pdf

  page-footer:
    left: ""
    right: "Built with Quarto"

quartodoc:
  package: aria_nbv
  source_dir: ../aria_nbv
  dir: reference
  out_index: reference/_api_index.md
  sidebar:
    file: reference/_sidebar.yml
    search: true
    style: docked
    collapse-level: 2
  css: reference/_styles-quartodoc.css
  parser: google
  options:
    signature_name: relative
    include_private: false
    include_imports: false
    include_empty: false
    include_attributes: true
    include_classes: true
    include_functions: true
    member_order: source
  sections:
    - title: "Stable Package Surface"
      desc: "Preferred import surfaces for datasets, geometry, rendering, training, and utilities."
      contents:
        - name: data_handling
          include_imports: true
          children: separate
          member_options: &embedded_members
            children: embedded
            include_attributes: true
            include_private: false
            include_imports: false
            member_order: source
        - name: pose_generation
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: rollouts
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: rendering
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: rri_metrics
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: lightning
          include_imports: false
          children: separate
          member_options: *embedded_members
        - name: configs
          include_imports: true
          children: separate
          member_options: *embedded_members
        - name: utils
          include_imports: true
          children: separate
          member_options: *embedded_members
    - title: "Implementation Contracts"
      desc: "Generated package contracts replacing the retired manual implementation pages."
      contents:
        - name: data_handling.efm_dataset
          children: separate
          member_options: *embedded_members
        - name: data_handling.efm_views
          children: separate
          member_options: *embedded_members
        - name: data_handling._offline_dataset
          children: separate
          member_options: *embedded_members
        - name: data_handling._offline_format
          children: separate
          member_options: *embedded_members
        - name: data_handling._offline_store
          children: separate
          member_options: *embedded_members
        - name: data_handling._target_selection
          children: separate
          member_options: *embedded_members
        - name: pose_generation.candidate_generation
          children: separate
          member_options: *embedded_members
        - name: pose_generation.candidate_mixture
          children: separate
          member_options: *embedded_members
        - name: pose_generation.counterfactuals
          children: separate
          member_options: *embedded_members
        - name: pose_generation.target_counterfactuals
          children: separate
          member_options: *embedded_members
        - name: pose_generation.types
          children: separate
          member_options: *embedded_members
        - name: rollouts.trace
          children: separate
          member_options: *embedded_members
        - name: rollouts.dataset_writer
          children: separate
          member_options: *embedded_members
        - name: rollouts.zarr_store
          children: separate
          member_options: *embedded_members
        - name: rendering.candidate_depth_renderer
          children: separate
          member_options: *embedded_members
        - name: rendering.candidate_pointclouds
          children: separate
