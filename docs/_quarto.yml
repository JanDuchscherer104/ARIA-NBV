project:
  type: website
  output-dir: .
  resources:
    - figures/

# Global execution defaults (fast iterations; deterministic rebuilds)
execute:
  freeze: auto      # re-render only when source changes
  cache: true       # cache expensive chunks across renders
  echo: false       # hide code by default (toggle via code-tools below)
  warning: false
  message: false

format:
  html:
    theme:
      light: cosmo
      dark: darkly           # built-in dark variant; auto toggles
    toc: true
    number-sections: true
    code-copy: true          # copy-to-clipboard buttons for code blocks
    code-tools: true         # per-page "Show code" toggle
    code-fold: show          # collapse long code by default
    link-external-newwindow: true
    fig-cap-location: bottom
    tbl-cap-location: top
    lightbox: true           # built-in lightbox for images (Quarto ≥1.4)

# Citations site-wide
bibliography: references.bib   # single source of truth
csl: ieee.csl                             # choose a style now or later
link-citations: true                      # clickable in-text cites

website:
  title: "Semantic NBV Planning"
  search:
    location: navbar
    type: overlay
  navbar:
    search: true
    left:
      - text: TODOs
        href: contents/todos.qmd
      - text: Setup
        href: contents/setup.qmd
      - text: Project State
        menu:
          - text: Roadmap
            href: contents/roadmap.qmd
          - text: Research Questions
            href: contents/questions.qmd
          - text: Findings
            href: contents/experiments/findings.qmd
      - text: Ressources
        menu:
        - text: Resources (External Links, Repos, Docs, etc.)
          href: contents/resources.qmd
        - text: ASE Dataset
          href: contents/ase_dataset.qmd
        - text: Glossary
          href: contents/glossary.qmd
    right:
      - icon: github
        menu:
          - text: "View Source"
            href: https://github.com/JanDuchscherer104/NBV
          - text: "Open Issue"
            href: https://github.com/JanDuchscherer104/NBV/issues
  sidebar:
    style: "docked"
    search: true
    collapse-level: 2
    contents:
      - section: "Literature"
        contents:
          - contents/literature/vin_nbv.qmd
          - contents/literature/gen_nbv.qmd
          - contents/literature/scene_script.qmd
          - contents/literature/efm3d.qmd
      - section: "Project State"
        contents:
          - contents/questions.qmd
          - contents/roadmap.qmd
          - contents/todos.qmd
      - section: Theory
        contents:
          - contents/theory/nbv_background.qmd
          - contents/theory/rri_theory.qmd
          - contents/theory/surface_metrics.qmd
          - contents/theory/semi-dense-pc.qmd
      - section: "Implementations"
        contents:
          - contents/impl/overview.qmd
          - contents/impl/atek_implementation.qmd
          - contents/impl/efm3d_implementation.qmd
          - contents/impl/prj_aria_tools_impl.qmd
          - contents/impl/rri_computation.qmd
          - contents/impl/oracle_rri_impl.qmd
          - contents/impl/efm3d_symbol_index.qmd
          - contents/impl/oracle_rri_package.qmd
      - section: "Presentations"
        contents:
          - text: "Typst Slides 1"
            file: typst/slides/slides_1.pdf
          - text: "Typst Slides 2"
            file: typst/slides/slides_2.pdf

  page-footer:
    left: ""
    right: "Built with Quarto"


