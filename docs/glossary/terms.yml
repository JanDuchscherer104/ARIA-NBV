- id: next-best-view
  anchor: term-next-best-view
  label: Next-Best-View
  short: NBV
  typst_macro: NBV
  aliases:
    - next best view
    - viewpoint selection
    - view planning
  category: planning.view_selection
  parent: view-planning
  definition_short: >
    Problem of selecting the next sensor viewpoint to improve an active
    reconstruction or inspection objective under a limited acquisition budget.
  definition_long: >
    In ARIA-NBV, the preferred objective is reconstruction quality improvement
    rather than coverage alone, with candidate views ranked by oracle or learned
    RRI scores.
  internal_links:
    - docs/contents/theory/nbv_background.qmd
    - docs/contents/thesis/roadmap.qmd
    - docs/contents/thesis/questions.qmd#research-questions
  citations:
    - VIN-NBV-frahm2025
    - GenNBV-chen2024
  related:
    - candidate-view
    - relative-reconstruction-improvement
    - view-introspection-network
  kg_tags:
    - planning
    - active-reconstruction

- id: relative-reconstruction-improvement
  anchor: term-relative-reconstruction-improvement
  label: Relative Reconstruction Improvement
  short: RRI
  typst_macro: RRI
  aliases:
    - reconstruction-quality gain
    - relative quality improvement
  category: metrics.reconstruction_quality
  parent: reconstruction-quality
  definition_short: >
    Metric quantifying the relative reconstruction-quality improvement obtained
    by adding a candidate observation to the current reconstruction.
  definition_long: >
    ARIA-NBV computes RRI by comparing reconstruction error before and after
    fusing candidate-view geometry, usually against an ASE ground-truth mesh for
    oracle supervision and evaluation.
  formula:
    tex: '\mathrm{RRI}(q)=\frac{d(P_t,M)-d(P_t\cup P_q,M)}{d(P_t,M)+\varepsilon}'
    typst: '$"RRI"(q) = (d(#(symb.oracle.points)_t, M) - d(#(symb.oracle.points)_t union #(symb.oracle.points_q), M)) / (d(#(symb.oracle.points)_t, M) + epsilon)$'
  notation:
    typst: '#symb.oracle.rri'
  internal_links:
    - docs/contents/theory/rri_theory.qmd
    - docs/contents/impl/rri_computation.qmd
    - docs/contents/literature/vin_nbv.qmd
  citations:
    - VIN-NBV-frahm2025
  related:
    - oracle-rri
    - target-specific-rri
    - candidate-view
  kg_tags:
    - metric
    - oracle-label
    - reconstruction-quality

