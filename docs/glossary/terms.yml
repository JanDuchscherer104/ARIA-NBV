  - relative quality improvement
  category: metrics.reconstruction_quality
  parent: reconstruction-quality
  tier: core
  lookup_rank: 20
  definition_short: Metric quantifying the relative reconstruction-quality improvement obtained
    by adding a candidate observation to the current reconstruction.
  definition_long: ARIA-NBV computes RRI by comparing reconstruction error before and after
    fusing candidate-view geometry, usually against an ASE ground-truth mesh for oracle supervision
    and evaluation.
  formula:
    tex: \mathrm{RRI}(q)=\frac{d(P_t,M)-d(P_t\cup P_q,M)}{d(P_t,M)+\varepsilon}
    typst: '$"RRI"(q) = (d(#(symb.oracle.points)_t, M) - d(#(symb.oracle.points)_t union #(symb.oracle.points_q),
      M)) / (d(#(symb.oracle.points)_t, M) + epsilon)$'
  notation:
