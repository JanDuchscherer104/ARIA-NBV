  - bounded return
  - cumulative target RRI
  category: planning.objective
  parent: target-conditioned-nbv-mdp
  tier: core
  lookup_rank: 180
  definition_short: H-step discounted return over target-RRI rewards.
  definition_long: The return definition keeps gamma symbolic so discounted ablations remain
    possible. The first thesis result should report cumulative target RRI under an equal acquisition
    budget and treat log-improvement or normalized rewards as follow-up analysis.
  formula:
