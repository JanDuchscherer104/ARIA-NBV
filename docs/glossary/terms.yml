  - candidate action set
  - masked candidate set
  - finite NBV action space
  category: planning.mdp
  parent: target-conditioned-nbv-mdp
  tier: core
  lookup_rank: 150
  definition_short: Masked finite action-index set over sampled candidate views.
  definition_long: At each rollout step, ARIA-NBV samples a finite candidate table Q_t={q_{t,i}}.
    The admissible action set contains indices i whose validity mask m_{t,i} is true, and
    selecting a_t chooses pose q_t=q_{t,a_t}. This keeps planning bounded and preserves invalidity
    as a feasibility constraint rather than a low-quality RRI label.
  formula:
    label: Masked finite action-index set
    tex: Q_t=\{q_{t,i}\}_{i=1}^{N_t},\quad \mathcal{A}(s_t)=\{i\in\{1,\ldots,N_t\}:m_{t,i}=1\},\quad
      q_t=q_{t,a_t}
  notation:
    typst: $cal(A)(s_t)$
