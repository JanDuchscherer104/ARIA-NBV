- id: finite-horizon-q-function
  anchor: term-finite-horizon-q-function
  label: Finite-Horizon Q Function
  short: Q_H
  aliases:
  - Q_H
  - candidate-query Q_H
  - bounded Q function
  - finite-candidate Q
  - fitted Double-Q head
  category: model.value
  parent: target-conditioned-nbv-mdp
  tier: core
  lookup_rank: 190
  definition_short: Finite-horizon candidate-value function for target-conditioned ARIA-NBV.
  definition_long: 'The mandatory M5 learned policy-like result is Q_H over finite candidate
    sets. The first-path architecture is a candidate-query Transformer: encode s_t^{cf0},
    actor-visible target descriptor z_e, selected-view history, budget state, and candidate
    tokens, then emit one value per candidate. DQN contributes replayed transition learning
    and Bellman-style finite-action value targets; Double DQN contributes the masked online-selector
    / target-evaluator backup to reduce max-over-candidate overestimation; IQL contributes
    the offline support rule that value learning must not query invalid, ungenerated, or unavailable
    actions. Q_H must respect validity masks and beat one-step greedy or model scoring on
    cumulative target RRI under equal acquisition budget, with bounded oracle lookahead as
    an upper bound.'
  formula:
    label: Finite-horizon candidate value
    tex: Q_H(s_t^{\mathrm{cf0}},a_t,z_e)=\mathbb{E}\left[G_t^{(H)}\mid s_t=s_t^{\mathrm{cf0}},a_t,z_e\right]
  formulae:
  - label: Masked Double-DQN selector
    tex: j^*=\arg\max_{j:m_{t+1,j}=1}Q_\theta(s_{t+1}^{\mathrm{cf0}},a_{t+1,j},z_e)
  - label: Masked Double-DQN target
    tex: y_t=r_t^e+\gamma(1-d_t)Q_{\bar\theta}(s_{t+1}^{\mathrm{cf0}},a_{t+1,j^*},z_e)
  notation:
    typst: $Q_H$
  symbol_refs:
  - rl.qh
