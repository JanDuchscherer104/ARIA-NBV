  label: Oracle RRI
  short: oracle RRI
  aliases:
    - RRI oracle
    - oracle label
    - mesh-supervised RRI
  category: supervision.oracle
  parent: relative-reconstruction-improvement
  definition_short: >
    RRI label computed with privileged ground-truth geometry, used for
    supervised training and evaluation.
  definition_long: >
    The current oracle renders candidate depth maps from ASE ground-truth meshes,
    backprojects candidate point clouds, fuses them with the current semi-dense
    reconstruction, and scores the resulting surface-distance improvement.
