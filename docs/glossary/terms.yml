- id: target-specific-rri
  anchor: term-target-specific-rri
  label: Target-Specific RRI
  short: target RRI
  aliases:
    - entity RRI
    - object RRI
    - target RRI
  category: metrics.reconstruction_quality
  parent: relative-reconstruction-improvement
  definition_short: >
    RRI computed only on the ground-truth and reconstructed geometry associated
    with a selected target of interest.
  definition_long: >
    Target-specific RRI lets the thesis compare views by how much they improve a
    selected object or region, even when scene-level RRI would prefer large
    background surfaces.
  formula:
    tex: '\mathrm{RRI}_e(q)=\frac{d(P_t^e,M_e)-d(P_t^e\cup P_q^e,M_e)}{d(P_t^e,M_e)+\varepsilon}'
  notation:
    typst: '$RRI_e$'
  internal_links:
    - docs/contents/thesis/questions.qmd#rq1-objective
    - docs/contents/thesis/questions.qmd#rq4-model
    - docs/contents/impl/rri_computation.qmd#entity-wise-rri
  citations:
