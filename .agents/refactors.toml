description = "Convert the root AGENTS.md into a thinner router and move detailed guidance into scoped skills/references over time."
priority = "medium"
status = "todo"
labels = ["guidance", "hygiene"]
issue_ids = ["issue-006"]
loc_min = 120
loc_expected = 280
loc_max = 700
context = ["Root AGENTS.md currently carries broad setup, workflow, verification, and recurring gotcha content.", "The desired direction is a progressive-disclosure dispatcher into nested AGENTS.md files, .agents/references, and focused skills."]
