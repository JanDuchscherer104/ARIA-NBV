[[refactor]]
id = "refactor-008"
title = "Rewrite oracle RRI scoring to avoid duplicating current points"
description = "Make OracleRRI score candidates with memory-lean distance composition instead of expanding P_t for every candidate."
priority = "high"
status = "todo"
labels = ["rri", "oracle", "performance", "geometry"]
issue_ids = ["issue-007", "issue-010"]
loc_min = 160
loc_expected = 500
loc_max = 1100
context = ["OracleRRI.score expands points_t to every candidate and concatenates it with points_q before calling chamfer_point_mesh_batched.", "rri_metrics.metrics repeats the GT mesh per candidate, which is expensive for many candidates and target-aware rollouts.", "The thesis needs target-aware and multi-step RRI, so hot-path memory pressure will grow before September."]
implementation_notes = ["Compute current point-to-mesh and mesh-to-current once.", "Compute candidate point-to-mesh separately, combine accuracy by weighted point counts, and compute completeness as the per-mesh-point minimum of current and candidate distances.", "Preserve RriResult semantics and add chunking only where it reduces peak memory without obscuring correctness."]
acceptance = ["RRI values match the existing implementation on focused unit tests within tolerance.", "Peak memory does not scale by physically duplicating P_t for every candidate.", "The implementation has explicit shape/frame docstrings and keeps metric names unchanged."]
verification = ["cd aria_nbv && uv run pytest tests/rri_metrics/test_oracle_rri_chunking.py tests/rri_metrics", "cd aria_nbv && uv run pytest tests/integration/test_oracle_rri_labeler_real_data.py"]

