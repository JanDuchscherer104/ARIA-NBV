resolved_at = "2026-05-02"
resolution_note = "The local vin_offline store is no longer version-blocked: manifest is v6, sample index has 48 rows, strict reader opens it, and nbv-summary --config-path offline_only.toml passes. Remaining partial-diagnostic caveats are covered by M1/Rerun/offline-store contracts."
