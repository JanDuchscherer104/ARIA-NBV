[[todo]]
id = "todo-066"
title = "Phase A: BM25 + Porter stemming + synonyms + Levenshtein fuzzy for kg-search"
description = "kg-search uses naive term-frequency scoring today (inspect.rs:1297 score_lexical: score as f32). A typo'd query (hierachical viewpoint) returns PB-NBV instead of Hestia because hierachical matches nothing and viewpoint frequency wins by sheer count. Replace the lexical scorer with BM25, add Porter stemming to the tokenizer, expand query tokens via a config-driven synonym table, and add a Levenshtein distance<=2 fallback that fires only on zero-exact-hits. Ships independently of Phase B (todo-067) and works even when Neo4j is unavailable."
priority = "high"
status = "resolved"
labels = ["litkg", "kg-search", "ranking", "bm25", "lexical"]
issue_ids = ["issue-025"]
loc_min = 250
loc_expected = 420
loc_max = 700
context = ["The 2026-05-11 'hierachical viewpoint' query incident exposed three lexical gaps: typo intolerance, no stemming, no synonym expansion.", "BM25 is the standard improvement over raw count: IDF penalises common terms (viewpoint) and rewards rare ones (hierarchical), and the document-length normalisation prevents long papers with many similarly-titled sections from dominating.", "Porter stemming via rust-stemmers crate (~4 KB, no transitive deps) collapses viewpoint/viewpoints and hierarchical/hierarchically.", "Synonyms live in a new [synonyms] table in .configs/litkg.toml; query tokens expand to (self + synonyms) capped at one count per token to avoid over-fire.", "Fuzzy fallback fires only on zero-exact-hits for tokens length>=5; surfaces query_fixups in JSON output."]
references = ["repo:.agents/external/litkg-rs/crates/litkg-core/src/ranking.rs", "repo:.agents/external/litkg-rs/crates/litkg-core/src/inspect.rs", "repo:.agents/external/litkg-rs/crates/litkg-core/src/config.rs", "repo:.configs/litkg.toml", "repo:scripts/kg/compact_search.jq", "repo:.agents/issues.toml#issue-025"]
implementation_notes = ["Add rust-stemmers crate (Porter English stemmer) to crates/litkg-core/Cargo.toml.", "In ranking.rs, extend the existing tokenize/is_search_stopword pipeline with stem(token) -> String; apply to BOTH index build and query tokens.", "Implement BM25 scorer in ranking.rs: score_bm25(q, d) = sum over query terms t of IDF(t) * (tf*(k1+1)) / (tf + k1*(1 - b + b*|d|/avgdl)) with k1=1.5, b=0.75 defaults.", "Compute IDF table once during index build; cache avgdl. Persist alongside the existing index data.", "Replace score_lexical at inspect.rs:1297 with score_bm25 call.", "Add [synonyms] deserialisation to config.rs; expand query tokens with synonyms after stemming.", "Add Levenshtein fuzzy fallback using strsim or inline DP impl; fire only when exact-match returned zero hits.", "Surface query_fixups in the JSON response; update scripts/kg/compact_search.jq to print fixup line.", "Regression-test on RRI / oracle / counterfactual / viewpoint queries; flag ordering changes >25 percent for manual review."]
acceptance = ["make kg-search KG_QUERY='hierachical viewpoint' returns Hestia in top 5; query_fixups field shows hierachical->hierarchical.", "make kg-search KG_QUERY='viewpoints' returns identical top-5 ordering as KG_QUERY='viewpoint' (stemming works).", "make kg-search KG_QUERY='NBV view selection' returns >=2 NBV papers in top 5 (synonym expansion).", "Existing exact-match queries (RRI, oracle) keep stable top-5 within +-1 position (BM25 regression baseline).", "Phase A works independently when Neo4j is down."]
