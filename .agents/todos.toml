id = "todo-071"
title = "Modality-aware stemming for kg-search BM25 (don't mangle code identifiers)"
description = "Today the SearchTokenizer applies Porter stemming uniformly across all candidate records inside metadata_search (litkg-viewer/src/query.rs). Code-symbol tokens like Vinformer or score_lexical get stemmed (Vinformer->vinform), creating asymmetric matches: the query stem matches paper bodies cleanly but is unreliable against code identifiers. A first attempt (2026-05-13) to skip stemming for GraphModality::Code broke the search_penalizes_generated_context_below_code_for_equal_matches authority invariant, because the query is still stemmed and would then only match stem-invariant tokens in raw code docs (rerun_logging vs query stem rerun+log lost the second hit). Need a coherent fix that preserves both: (a) typo/plural tolerance for natural-language docs, (b) authority-correct ranking when both code and generated-context records contain the same identifier."
priority = "medium"
status = "todo"
labels = ["litkg", "kg-search", "ranking", "stemming"]
issue_ids = ["issue-025"]
loc_min = 80
loc_expected = 200
loc_max = 400
context = ["User asked 2026-05-12 to stem only Paper/DocSection content. Naive implementation breaks the BM25 symmetry test because the query is stemmed but code docs are not.", "Options: (1) stem queries asymmetrically (stem when comparing against natural-language docs, raw when comparing against code), (2) extend the tokenizer with an identifier-shape heuristic that skips stemming on CamelCase / underscore-joined tokens, (3) accept stemming everywhere and document the Vinformer->vinform limitation."]
