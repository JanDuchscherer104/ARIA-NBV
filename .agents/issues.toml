[[issue]]
id = "issue-022"
title = "Cluster-scale oracle and rollout generation path is not production-proven"
description = "Scaling oracle labels, rollout datasets, and Q_H training data needs the existing deterministic shard/resume tracer bullet to be hardened into a real LRZ write path with global run status, complete source lineage, storage-footprint controls, and DSS-safe staging before full-scale generation starts."
type = "infrastructure"
priority = "high"
status = "open"
labels = ["cluster", "slurm", "lrz", "storage", "data-generation"]
context = ["Scaling oracle and rollout generation beyond smoke subsets requires deterministic sharding, idempotent writes, resumability, and storage-aware staging before cluster jobs run.", "The rollout package now has a source-row shard manifest, shard-mode CLI, temp-to-final promotion, owner sidecars, success markers, and validation-backed skip-on-rerun scaffolding, but this has not yet been exercised as a real LRZ Slurm/Pyxis array over thesis-scale source rows.", "Orchestration decision: PyTorch Lightning Trainer should remain the model-training loop, not the rollout-generation owner. Slurm array plus nbv-build-rollouts owns shard scheduling; Lightning Fabric is optional only inside one shard if multi-GPU model/inference setup becomes necessary.", "Package stance: submitit is acceptable as a thin optional Slurm/local launcher around the existing CLI, while Dask/Ray/Snakemake/Prefect/Luigi are deferred until profiling proves the simple Slurm-array path cannot satisfy throughput or dependency management.", "Source-row lineage is present as source_shard_id/source_shard_row plus source manifest and split hashes, but the production contract still needs a queryable run manifest, final shard index/content hashes, source_store_dir/version validation, root-candidate/root-tensor join policy, and coverage accounting across succeeded, failed, skipped, and missing shards.", "The cluster image must avoid compromised Lightning package versions 2.6.2 and 2.6.3; the local lock currently imports pytorch_lightning 2.6.0 and lightning 2.6.1.", "The final experiment scale bar is the full 100 GT-mesh ASE scenes and 4,608 snippet windows after small-subset correctness, so LRZ Slurm/DSS readiness is a hard M2/M3 gate before full target/RL generation.", "LRZ access exists and no workstation should be assumed as the scale path; Enroot/Pyxis and DSS constraints make naive multi-hundred-GB cache generation a practical thesis risk, not just infrastructure polish."]
