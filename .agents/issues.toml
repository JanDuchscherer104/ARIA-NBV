[[issue]]
id = "issue-018"
title = "Rollout dataset storage and reporting schema is not finalized"
description = "RolloutTrace now covers replayable smoke traces, but large-scale rollout and Q_H generation still need a Zarr-first dataset/reporting contract with lineage, field retention policy, target-crop retention, and storage-footprint controls."
type = "research-debt"
priority = "high"
status = "open"
labels = ["rollouts", "data", "contracts", "storage", "thesis"]
context = ["Bounded rollouts are now part of the thesis direction, and resolved todo-025 added typed RolloutTrace, RolloutStepTrace, RolloutLineage, MessagePack IO, a synthetic smoke command, and tests.", "The remaining gap is the large-scale dataset/reporting layer for ASE oracle rollouts and target-conditioned candidate-query Q_H: Zarr-first groups, replay/evaluation payloads, lineage manifests, cumulative-metric reports, Q_H training fields, and storage-footprint summaries.", "The first standalone rollouts.zarr tracer bullet now has review hardening for explicit target-RRI provenance, multi-target q_h target identity, PoseTW root-relative transforms, per-rollout split/lineage fields, and validator-backed regression tests.", "Storage decision: do not mutate or version-bump the immutable VIN offline root store for multi-step replay. Keep rollout artifacts separate, source-link immutable VIN root rows, and make rollouts.zarr own the action-space facts actually used for rollout/Q_H training.", "Root candidates should move into the rollout artifact when they define the rollout/Q_H candidate table; heavy root tensors such as EVL/backbone fields, meshes, all-candidate depth maps, and raw ASE/ATEK assets stay in the VIN/root/source stores unless a retention profile explicitly materializes a lean derived feature or audit block.", "The store must be rich enough for training and evaluation without duplicating raw ASE/ATEK products: full meshes are external path/hash/version references, while high-detail target mesh crops are embedded once per target with crop metadata.", "Factual tables remain canonical; persisted dense Q_H/training_core views are derived hot-layout caches that must validate back to sources/targets/rollouts/steps/candidates.", "The current implementation contract is schema 0.5-selected-depth: selected_depth/ persists selected-action depth only, fixed 240x240, float16 metric metres, separate bool valid_mask, Blosc/Zstd bitshuffle compression, and a Q_H/history-only role; q_h/ persists a chunked derived candidate-query training view with source/target ids, masks, rewards, invalid reasons, and TD/bootstrap links.", "Local rollout stores .data/offline_cache/rollouts_v1_microset.zarr and .data/offline_cache/rollouts_v1_smoke.zarr are stale schema 0.3/0.4 artifacts without selected_depth/ and must not be treated as current training data.", "High-resolution selected depth is attached after rollout generation, so it does not currently advance that rollout's transition/RRI semantics; low-resolution selected point clouds from the candidate scoring path still drive rollout history.", "The multimodal rollout alignment adds unresolved training/audit retention questions: selected-child RGB-D and derived features, validation/audit one-step modality parity, Zarr-tree introspection, and full Rerun plus Streamlit branch inspection are still active design work.", "Large sequence data should not be generated until this storage/reporting contract is explicit, review-clean, multimodal-retention-aware, and compatible with deterministic sharding."]
references = ["repo:aria_nbv/aria_nbv/rollouts/AGENTS.md", "repo:aria_nbv/aria_nbv/rollouts/zarr_store.py", "repo:aria_nbv/aria_nbv/rollouts/dataset_writer.py", "repo:aria_nbv/aria_nbv/rollouts/trace.py", "repo:aria_nbv/aria_nbv/pose_generation/counterfactuals.py", "repo:aria_nbv/aria_nbv/data_handling/README.md#manifest-backed-rollout-store", "repo:docs/typst/shared/data-layout-trees.typ#rollout-zarr-tree", "repo:docs/figures/diagrams/data_handling/mermaid/rollout_generation_sequence.mmd", "repo:docs/figures/diagrams/data_handling/mermaid/offline_rollout_physical_layout.mmd", "repo:aria_nbv/tests/rollouts/test_zarr_store.py", "repo:aria_nbv/tests/rollouts/test_dataset_writer.py", "repo:docs/typst/thesis/advisor_distillation.typ", "repo:docs/contents/thesis/questions.qmd#rq4-planning", "repo:docs/contents/thesis/questions.qmd#rq-evidence-protocol", "repo:docs/contents/theory/rl_planning.qmd", "repo:.agents/references/rollout_zarr_q_invalidity_contract.md", "repo:aria_nbv/aria_nbv/data_handling/_rollout_zarr_store.py", "repo:aria_nbv/aria_nbv/pose_generation/rollout_trace.py", "repo:aria_nbv/aria_nbv/rerun_inspector/_rollout_zarr.py", "repo:aria_nbv/aria_nbv/app/panels/rl.py", "repo:aria_nbv/tests/data_handling/test_rollout_zarr_store.py", "repo:.agents/resolved.toml#todo-025", "repo:.agents/resolved.toml#todo-057", "repo:.agents/memory/history/2026/05/2026-05-06_rollout_softmax_zarr_store.md", "url:https://zarr-specs.readthedocs.io/en/latest/v3/core/index.html", "bib:TrajectoryTransformer-janner2021"]

