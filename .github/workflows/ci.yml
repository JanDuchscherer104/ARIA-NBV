name: Root Verification

on:
  pull_request:
    paths:
      - ".agents/**"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".configs/**"
      - "AGENTS.md"
      - "Makefile"
      - "README.md"
      - "SETUP.md"
      - "aria_nbv/**"
      - "docs/**"
      - "scripts/agents_db.py"
      - "scripts/templates/lrz/**"
      - "scripts/validate_agent_memory.py"
      - "scripts/validate_qmd_frontmatter.py"
  push:
    branches:
      - main
    paths:
      - ".agents/**"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
      - ".configs/**"
      - "AGENTS.md"
      - "Makefile"
      - "README.md"
      - "SETUP.md"
      - "aria_nbv/**"
      - "docs/**"
      - "scripts/agents_db.py"
      - "scripts/templates/lrz/**"
      - "scripts/validate_agent_memory.py"
      - "scripts/validate_qmd_frontmatter.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: root-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PYTHON_INTERPRETER: python
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip PyYAML uv

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Typst
        uses: typst-community/setup-typst@v5.1.0

      - name: Run root CI contract
        env:
          CI_RENDER_DIR: ${{ runner.temp }}/aria-nbv-ci-renders
        run: make ci
