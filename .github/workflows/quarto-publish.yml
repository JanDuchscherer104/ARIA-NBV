name: Publish Quarto Site

on:
  push:
    branches:
      - main
    paths:
      - "aria_nbv/aria_nbv/**"
      - "aria_nbv/pyproject.toml"
      - "aria_nbv/uv.lock"
      - "docs/**"
      - "scripts/quarto_generate_api_docs.sh"
      - "scripts/glossary_build.py"
      - "scripts/validate_qmd_frontmatter.py"
      - ".github/workflows/quarto-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs generators
        run: python -m pip install --upgrade pip "quartodoc==0.11.1" "PyYAML"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate API reference
        run: make api-docs

      - name: Generate glossary artifacts
        run: python scripts/glossary_build.py all

      - name: Check QMD frontmatter
        run: make qmd-frontmatter-check PYTHON_INTERPRETER=python

      - name: Check generated glossary drift
        run: |
          git diff --exit-code -- \
            docs/contents/glossary.qmd \
            docs/typst/shared/glossary.generated.typ \
            docs/_generated/context/glossary.jsonl \
            docs/_extensions/aria-glossary/glossary_terms.generated.lua \
            docs/_extensions/aria-glossary/notation.generated.lua \
            docs/typst/shared/notation.generated.typ

      - name: Render docs site
        run: quarto render docs --no-execute

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
