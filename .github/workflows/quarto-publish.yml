name: Publish Quarto Site

on:
  push:
    branches:
      - main
    paths:
      - "aria_nbv/**"
      - "docs/**"
      - "scripts/quarto_generate_api_docs.sh"
      - ".github/workflows/quarto-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API docs generator
        run: python -m pip install --upgrade pip quartodoc

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate API reference
        run: ./scripts/quarto_generate_api_docs.sh

      - name: Render docs site
        run: quarto render docs --no-execute

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
